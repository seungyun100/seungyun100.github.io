short_bio: >-
  <p>
    I am a wildlife ecologist with primary interests in spatial and behavioral ecology to advance the conservation and management of large mammals.
    My work focuses on integrating GPS telemetry and spatial modeling to understand animal decision-making, specifically how they acquire resources while avoiding risks in complex environments.
    Learn more about my research <a href="https://seungyun100.github.io/research">here</a>.
  </p>
  <p>
    Research keywords include: <span class="text-hl">Space use</span>, <span class="text-hl">Movement</span>,  <span class="text-hl">Behavior</span>,
    <span class="text-hl">Human-Wildlife coexistence</span>, and so on.
  </p>
  <div class="h6 mt-5">Brief Biography</div>
  <p>
    I am currently a postdoctoral Researcher at the Forest Biological Conservation Lab of <a href="https://web.tuat.ac.jp/~for-bio/" target="_blank">Tokyo University of Agriculture and Technology</a> in Tokyo, Japan. 
    Previously, I finished my Ph.D. in Animal Ecology at Tokyo University of Agriculture and Technology in March 2025, under the supervision of <a href="https://scholar.google.com/citations?user=b0HalkoAAAAJ&hl=en" target="_blank">Prof. Shinsuke Koike</a>. 
  </p>
